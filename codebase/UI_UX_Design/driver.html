<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài Xế - Giao Hàng (Driver)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #e9ecef; display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }
        .mobile-frame {
            width: 375px; height: 812px; background: #f8f9fa; border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2); border: 12px solid #212529; position: relative;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .header { background: #f4511e; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 18px; padding-top: 40px; }
        
        /* Map background simulation */
        .map-bg { flex: 1; background: url('https://upload.wikimedia.org/wikipedia/commons/b/bd/Google_Maps_Logo_2020.svg') no-repeat center; background-size: 50%; background-color: #e3eaef; position: relative; display: flex; flex-direction: column; justify-content: flex-end; }
        
        .order-card { background: white; margin: 15px; border-radius: 16px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .price { font-size: 24px; font-weight: bold; color: #f4511e; margin-bottom: 5px; }
        .distance { font-size: 14px; color: #666; margin-bottom: 15px; }
        
        .route { border-left: 2px dashed #ccc; margin-left: 10px; padding-left: 20px; margin-bottom: 20px; position: relative; }
        .route-point { position: relative; margin-bottom: 15px; font-size: 15px; color: #333; }
        .route-point::before { content: ''; position: absolute; left: -25px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: #f4511e; border: 2px solid white; box-shadow: 0 0 0 1px #f4511e; }
        .route-point.dest::before { background: #4caf50; box-shadow: 0 0 0 1px #4caf50; }
        .route-point span { display: block; font-size: 12px; color: #999; margin-top: 2px; }

        .btn-action { width: 100%; background: #f4511e; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .btn-action.delivering { background: #4caf50; }
        .btn-action.success { background: #2196F3; pointer-events: none; }
    </style>
</head>
<body>
<div class="mobile-frame">
    <div class="header">App Tài Xế (AhaMove)</div>
    
    <div class="map-bg">
        <div class="order-card">
            <div class="price">25.000đ</div>
            <div class="distance">Giao hàng hỏa tốc • 3.2 km</div>
            
            <div class="route">
                <div class="route-point">
                    Bách Hóa Xanh (Điểm lấy hàng)
                    <span>Đã thanh toán sẵn - Đồ tươi sống</span>
                </div>
                <div class="route-point dest">
                    Tòa nhà văn phòng Keangnam
                    <span>Khách hàng: Chị Lan (SĐT: 098xxxxxx)</span>
                </div>
            </div>

            <button class="btn-action" id="driverBtn" onclick="nextState()">NHẬN ĐƠN NGAY</button>
        </div>
    </div>
</div>

<script>
    let state = 0;
    function nextState() {
        let btn = document.getElementById('driverBtn');
        state++;
        if(state === 1) {
            btn.innerText = "Trượt để xác nhận ĐÃ LẤY HÀNG";
            btn.style.background = "#ff9800";
        } else if (state === 2) {
            btn.innerText = "ĐANG GIAO HÀNG (Bấm khi đến nơi)";
            btn.classList.add('delivering');
        } else if (state === 3) {
            btn.innerText = "✓ GIAO THÀNH CÔNG";
            btn.classList.add('success');
        }
    }
</script>
</body>
</html>
